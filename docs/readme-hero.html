<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Better Mac Taskbar — README hero</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1280px;
      height: 560px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    .scene {
      width: 1280px;
      height: 560px;
      position: relative;
      /* Match AppIcon wallpaper blues */
      background:
        radial-gradient(ellipse 100% 80% at 20% 8%, #3adcfb 0%, transparent 52%),
        radial-gradient(ellipse 90% 70% at 70% 20%, #12abf6 0%, transparent 55%),
        linear-gradient(160deg, #1a9ff0 0%, #0d7ae3 45%, #0a62c8 100%);
    }
    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 130% 45% at 40% -15%, rgba(255,255,255,0.35), transparent 50%),
        radial-gradient(ellipse 70% 55% at 95% 35%, rgba(8, 70, 170, 0.35), transparent 55%);
      pointer-events: none;
    }

    .taskbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 96px;
      display: flex;
      align-items: stretch;
      background: linear-gradient(
        180deg,
        rgba(42, 42, 46, 0.82) 0%,
        rgba(22, 22, 24, 0.88) 100%
      );
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.28);
    }

    .start {
      width: 96px;
      display: grid;
      place-items: center;
      background: rgba(0, 120, 215, 0.92);
      flex-shrink: 0;
    }
    .start-logo {
      width: 34px;
      height: 34px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5px;
    }
    .start-logo span {
      background: #fff;
      border-radius: 1px;
      display: block;
    }

    .divider {
      width: 1px;
      margin: 22px 2px;
      background: rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
    }

    .icons {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 12px;
    }

    .icon {
      width: 72px;
      height: 80px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
    }
    .icon.active {
      background: rgba(255, 255, 255, 0.08);
    }
    .icon .glyph {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .icon .bar {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.45);
    }
    .icon.active .bar {
      width: 42px;
      height: 4px;
      background: #0078d6;
      box-shadow: 0 0 10px rgba(0, 120, 214, 0.75);
    }

    /* Fake app glyphs */
    .g-finder {
      background: linear-gradient(160deg, #5ac8fa, #007aff);
      position: relative;
    }
    .g-finder::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 16px;
      border: 3px solid #fff;
      border-radius: 50%;
      border-bottom-color: transparent;
      border-left-color: transparent;
      transform: rotate(-40deg);
      top: 10px;
    }
    .g-chrome {
      background: conic-gradient(from 210deg, #ea4335, #fbbc04, #34a853, #4285f4, #ea4335);
      position: relative;
    }
    .g-chrome::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 5px #4285f4;
    }
    .g-slack {
      background: #4a154b;
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.5px;
    }
    .g-code {
      background: linear-gradient(145deg, #2b2b2b, #1a1a1a);
      color: #007acc;
      font-weight: 800;
      font-size: 18px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .g-notes {
      background: linear-gradient(180deg, #ffd60a, #ff9f0a);
      color: #5c3b00;
      font-weight: 700;
      font-size: 15px;
    }

    .tray {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 10px 0 6px;
      color: rgba(255, 255, 255, 0.92);
      flex-shrink: 0;
    }
    .tray-btn {
      width: 36px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 3px;
      opacity: 0.92;
    }
    .tray svg { width: 18px; height: 18px; fill: currentColor; }
    .clock {
      width: 92px;
      text-align: right;
      padding-right: 8px;
      line-height: 1.15;
    }
    .clock .time {
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .clock .date {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      opacity: 0.92;
    }
    .show-desktop {
      width: 8px;
      align-self: stretch;
      margin: 0 0 0 4px;
      border-left: 1px solid rgba(255,255,255,0.22);
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="scene" id="hero">
    <div class="taskbar">
      <div class="start" title="Start">
        <div class="start-logo" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="icons">
        <div class="icon active">
          <div class="glyph g-finder"></div>
          <div class="bar"></div>
        </div>
        <div class="icon active">
          <div class="glyph g-chrome"></div>
          <div class="bar"></div>
        </div>
        <div class="icon active">
          <div class="glyph g-code"></div>
          <div class="bar"></div>
        </div>
        <div class="icon">
          <div class="glyph g-slack">#</div>
          <div class="bar"></div>
        </div>
        <div class="icon">
          <div class="glyph g-notes">Aa</div>
          <div class="bar"></div>
        </div>
      </div>
      <div class="tray">
        <div class="tray-btn" title="Hidden icons">
          <svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5H7z"/></svg>
        </div>
        <div class="tray-btn" title="Network">
          <svg viewBox="0 0 24 24"><path d="M12 18a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm-4.2-3.3a6 6 0 018.4 0l-1.4 1.4a4 4 0 00-5.6 0l-1.4-1.4zm-2.9-2.9a10 10 0 0114.2 0l-1.4 1.4a8 8 0 00-11.4 0l-1.4-1.4z"/></svg>
        </div>
        <div class="tray-btn" title="Sound">
          <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a3.5 3.5 0 00-1.8-3.1v6.2A3.5 3.5 0 0016.5 12z"/></svg>
        </div>
        <div class="clock">
          <div class="time">5:09 PM</div>
          <div class="date">7/15/2026</div>
        </div>
        <div class="show-desktop" title="Show Desktop"></div>
      </div>
    </div>
  </div>
</body>
</html>
